interface:
  display_name: "Sync"
  short_description: "Install published repo skills from the GitHub skills subpath"
  default_prompt: "Use this skill to install every published skill from the current repository onto the current machine with bunx skills, using https://github.com/sjunepark/custom-skills/tree/main/skills and defaulting to --copy -g -a claude-code -a pi unless the user explicitly wants a different target set."
