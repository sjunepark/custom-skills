interface:
  display_name: "Change Explainer"
  short_description: "Teach diffs and change sets with snippets, before/after contrasts, and implications"
  default_prompt: "Use change-explainer when the user wants to understand a diff, unstaged changes, a commit, a PR patch, or two file versions as a guided walkthrough rather than a raw recap. Start with the big picture, then explain the main behavior, contract, and implementation changes in learning order with embedded snippets. Use before/after contrasts or a compact ASCII diagram when they materially improve understanding. Focus on what changed, why, how it works, and only surface important concerns when they materially matter."
