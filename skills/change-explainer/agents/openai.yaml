interface:
  display_name: "Change Explainer"
  short_description: "Teach diffs as changed systems, with snippets, before/after contrasts, and implications"
  default_prompt: "Use change-explainer when the user wants to understand a diff, unstaged changes, a commit, a PR patch, or two file versions as a guided walkthrough rather than a raw recap. Start with the big picture, teach the smallest useful post-change mental model, then explain the main behavior, contract, and implementation changes in learning order with embedded snippets. Prefer a before/after/why arc when contrast helps, and use a compact ASCII diagram when flow or ownership changes are easier to see than describe. Focus on what changed, why, how the edits fit one idea, and only surface important concerns when they materially matter."
