interface:
  display_name: "Learning Material Writer"
  short_description: "Create concise repo learning docs under docs/learning"
  default_prompt: "Use $learning-material-writer only when the user explicitly asks for repo learning material, onboarding docs, a codebase handbook, or docs/learning content. Default to the whole repository unless they scope it further. Write concise, navigable docs under docs/learning with INDEX.md pages and a directory structure that reads like a table of contents. Apply $teach's mental-model-first teaching style: purpose first, then main flows, boundaries, responsibilities, interactions, and design decisions, with snippets or compact ASCII diagrams only when they materially help."