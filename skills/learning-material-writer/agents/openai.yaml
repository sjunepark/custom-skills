interface:
  display_name: "Learning Material Writer"
  short_description: "Create concise onboarding docs under docs/learning"
  default_prompt: "Use $learning-material-writer only when the user explicitly asks for repo learning material, onboarding docs, a codebase handbook, or docs/learning content. Default to the whole repository unless they scope it further. Write concise, navigable docs under docs/learning with INDEX.md pages and a directory structure that reads like a table of contents. Make it explicit that this material is for onboarding and reader orientation, not the authoritative source of truth for implementation behavior or project decisions; when a suitable repo-level documentation surface already exists, update it too if needed so that status is visible there. Apply $teach's mental-model-first teaching style: purpose first, then main flows, boundaries, responsibilities, interactions, and design decisions, with snippets or compact ASCII diagrams only when they materially help."
