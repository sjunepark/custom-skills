interface:
  display_name: "Planning Doc Triad"
  short_description: "Separate roadmap, TODO, and active plan docs cleanly"
  default_prompt: "Use $planning-doc-triad when the user wants to create or clean up planning documents in a software project. Reuse the repo's canonical roadmap, todo, and active plan files when they already exist; otherwise default to `docs/roadmap.md`, `TODO.md`, and `PLAN.md`."
