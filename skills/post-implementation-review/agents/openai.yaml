interface:
  display_name: "Post-Implementation Review"
  short_description: "Manual post-implementation design review for already-implemented code."
  default_prompt: "Use $post-implementation-review only when the user explicitly asks for this review or explicitly asks whether implemented code revealed design flaws, abstraction issues, structural complexity, organization problems, or worthwhile refactors after the code exists. Do not use it for ordinary implementation, debugging, explanation, or generic code review requests. Prioritize actual design flaws, ownership confusion, abstraction leaks, overengineering, and organization or structure weaknesses over minor local polish. Recommend changes when there is credible design or structural upside, even if the refactor touches many files, but avoid padding the review with tiny helper extractions, one-off log polish, or isolated readability nits unless they point to a broader problem. Review both post-implementation signals and, when relevant, structure signals in both directions: over-structure (speculative abstractions, unused fields, premature genericity, wrappers or config surfaces the current behavior does not need) and under-structure (flat directories, mixed responsibilities, scattered ownership). Classify findings into Bucket I — Straightforward / Recommended and Bucket II — Worth Discussing, keeping Bucket I concise. Preserve readability-oriented structure when it clearly helps comprehension, naming, or boundaries. When citing existing code, prefer short embedded snippets with the source file path on the first line as a comment instead of editor-oriented file and line references."
policy:
  allow_implicit_invocation: false
