interface:
  display_name: "Post-Implementation Review"
  short_description: "Improvement-oriented post-implementation review that recommends credible cleanups and separates straightforward fixes from decisions worth discussing."
  default_prompt: "Use $post-implementation-review after implementation work when you need to judge whether real code exposed design flaws, abstraction issues, structural complexity, organization problems, or worthwhile refactors. Default toward recommending changes when there is credible design or readability upside, even if the gains are modest or the refactor touches many files; discuss real tradeoffs rather than treating churn as a veto. Review both post-implementation signals and, when relevant, structure signals in both directions: over-structure (speculative abstractions, unused fields, premature genericity) and under-structure (flat directories, mixed responsibilities, scattered ownership). Classify findings into Bucket I — Straightforward / Recommended and Bucket II — Worth Discussing, keeping Bucket I concise. Preserve readability-oriented structure when it clearly helps comprehension, naming, or boundaries. When citing existing code, prefer short embedded snippets with the source file path on the first line as a comment instead of editor-oriented file and line references."
