interface:
  display_name: "Post-Implementation Review"
  short_description: "Cautious post-implementation review for real design flaws, structural issues, and refactors worth doing now."
  default_prompt: "Use $post-implementation-review after implementation work when you need to judge whether real code exposed design flaws, abstraction issues, structural complexity, organization problems, or a refactor worth doing now. Review both post-implementation signals and, when relevant, structure signals in both directions: over-structure (speculative abstractions, unused fields, premature genericity) and under-structure (flat directories, mixed responsibilities, scattered ownership). Preserve readability-oriented structure when it clearly helps comprehension, naming, or boundaries. When citing existing code, prefer short embedded snippets with the source file path on the first line as a comment instead of editor-oriented file and line references."
